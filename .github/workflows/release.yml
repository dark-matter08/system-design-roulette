name: Release

# Builds run ONLY when you push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
# Nothing builds on ordinary pushes — pushing a tag is the explicit "build a release" signal.
# Manual runs are also allowed via the Actions tab (workflow_dispatch).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to create the GitHub Release and upload bundles

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
            rust-target: aarch64-apple-darwin
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04 # Linux
            args: ""
            rust-target: ""
          - platform: windows-latest # Windows
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.platform }}-${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "System Design Roulette ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform from the assets below."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
